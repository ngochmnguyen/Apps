name: Send deadline reminder emails

# Daily pass: emails users 7 and 2 days before a saved opportunity's deadline.
# sent_reminders dedups sends, so this is safe to re-run or run twice a day.
on:
  schedule:
    - cron: "0 13 * * *" # daily 13:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab too

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Send reminder emails
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node src/send-reminders.js
