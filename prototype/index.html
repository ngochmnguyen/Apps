  .chip {

  .card.state-soon { border-left-color: var(--state-soon); }

    border-radius: 3px;
    font-weight: 700;
    font-size: 13px;

    text-decoration: none;
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 14px;
  }

  @media (prefers-reduced-motion: no-preference) {
    .card { transition: opacity 120ms ease; }
  }
</style>

<div class="masthead">

    </div>

    <div class="filter-group">

      <div class="field">
        <select id="f-compensation"></select>
      </div>
    </div>

    <div class="filter-group">

      <div class="field">
        <select id="f-urgency">

        </select>
      </div>
      <label class="checkline"><input type="checkbox" id="f-show-closed" /> Include closed listings</label>
    </div>
  </aside>

  <main class="results">
    <div class="results-toolbar">
      <div class="results-count"><b id="visible-count" class="tabular">0</b> opportunities match</div>
      <div class="sortline">

          <option value="newest">Recently added</option>
        </select>
      </div>
    </div>
    <div class="list" id="list"></div>
  </main>
</div>

  function fill(select, pairs, withAll) {
    const opts = withAll ? [["all", "All"]].concat(pairs) : pairs;
    select.innerHTML = opts.map(([v, l]) => `<option value="${v}">${l}</option>`).join("");
  }

  const countryPairs = Object.keys(COUNTRIES).sort((a, b) => COUNTRIES[a].name.localeCompare(COUNTRIES[b].name))
    .map((c) => [c, `${COUNTRIES[c].name} (${c})`]);

  fill(document.getElementById("f-nationality"), countryPairs, true);
  fill(document.getElementById("f-residence"), countryPairs, true);
  // profile identity fields describe who the user is, so unlike browse filters
  // they get a real default rather than an "All" placeholder
  fill(document.getElementById("f-education"), EDUCATION_LEVELS, false);
  fill(document.getElementById("f-career"), CAREER_STAGES, false);
  fill(document.getElementById("f-employment"), EMPLOYMENT, false);
  fill(document.getElementById("f-english"), ENGLISH, false);
  document.getElementById("f-education").value = "masters_completed";
  document.getElementById("f-career").value = "recent_grad";
  document.getElementById("f-employment").value = "unemployed";
  document.getElementById("f-english").value = "c1";
  fill(document.getElementById("f-compensation"), [
    ["cash", "Cash included"], ["in_kind_only", "In-kind only (no cash)"], ["cash_and_in_kind", "Cash + in-kind"],
  ], true);

  const typeBox = document.getElementById("f-types");
  TYPES.forEach(([v, l]) => {
    const chip = document.createElement("div");
    chip.className = "chip"; chip.dataset.value = v; chip.textContent = l;
    chip.addEventListener("click", () => { chip.classList.toggle("active"); render(); });
    typeBox.appendChild(chip);
  });

  const regionBox = document.getElementById("f-region");
  [["all", "All destinations"], ["nonconventional", "Non-conventional only"], ["conventional", "Conventional only"]].forEach(([v, l], i) => {
    const chip = document.createElement("div");
    chip.className = "chip" + (i === 0 ? " active" : ""); chip.dataset.value = v; chip.textContent = l;
    chip.addEventListener("click", () => {
      [...regionBox.children].forEach((c) => c.classList.remove("active"));
      chip.classList.add("active"); render();
    });
    regionBox.appendChild(chip);
  });

  function urgency(deadline) {
    const days = (new Date(deadline) - new Date(new Date().toDateString())) / 86400000;
    if (days < 0) return "closed";
    if (days <= 7) return "soon";
    if (days <= 30) return "month";
    return "open";
  }
  function urgencyClass(u) { return u === "closed" ? "state-closed" : u === "soon" ? "state-soon" : "state-open"; }
  function urgencyLabel(deadline, u) {
    const d = new Date(deadline);
    const nice = d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    if (u === "closed") return `Closed ${nice}`;
    if (u === "soon") return `Closes ${nice} · soon`;
    return `Closes ${nice}`;
  }

  function eligibility(o, profile) {
    const reasons = [];
    if (profile.age < o.minAge || (o.maxAge && profile.age > o.maxAge)) reasons.push("age");
    if (o.gradOnly && profile.career !== "grad_student" && !["masters_in_progress", "phd_in_progress"].includes(profile.education)) {
      reasons.push("grad-student only");
    }
    if (o.education.length && !o.education.includes(profile.education)) reasons.push("education level");
    if (o.career.length && !o.career.includes(profile.career)) reasons.push("career stage");
    if (o.employment.length && !o.employment.includes(profile.employment)) reasons.push("employment status");
    if (ENGLISH_RANK[profile.english] < ENGLISH_RANK[o.english]) reasons.push("English level");
    // include list = whitelist; exclude list always subtracts, regardless of include rows
    if (o.nationality.type === "include" && !o.nationality.list.includes(profile.nationality)) reasons.push("nationality restricted");
    if (o.nationality.type === "exclude" && o.nationality.list.includes(profile.nationality)) reasons.push("nationality restricted");
    return { eligible: reasons.length === 0, reasons };
  }

  function compLine(o) {
    const parts = [];
    if (o.stipendMin) {
      parts.push(o.stipendMin === o.stipendMax ? `${o.currency} ${o.stipendMin.toLocaleString()}` : `${o.currency} ${o.stipendMin.toLocaleString()}–${o.stipendMax.toLocaleString()}`);
    }
    const covered = [o.flight && "flight", o.lodging && "lodging", o.meals && "meals"].filter(Boolean);
    if (covered.length) parts.push(covered.join(" + ") + " covered");
    return parts.join(" · ") || "In-kind only";
  }

  function readProfile() {
    return {
      nationality: document.getElementById("f-nationality").value,
      residence: document.getElementById("f-residence").value,
      age: parseInt(document.getElementById("f-age").value, 10) || 0,
      education: document.getElementById("f-education").value,
      career: document.getElementById("f-career").value,
      employment: document.getElementById("f-employment").value,
      english: document.getElementById("f-english").value,
      disability: document.getElementById("f-disability").checked,
    };
  }

  const list = document.getElementById("list");
  const openIds = new Set();

  function render() {
    const profile = readProfile();
    const eligibleOnly = document.getElementById("f-eligible-only").checked;
    const showClosed = document.getElementById("f-show-closed").checked;
    const search = document.getElementById("f-search").value.trim().toLowerCase();
    const urgencyFilter = document.getElementById("f-urgency").value;
    const compFilter = document.getElementById("f-compensation").value;
    const regionFilter = regionBox.querySelector(".chip.active").dataset.value;
    const activeTypes = [...typeBox.querySelectorAll(".chip.active")].map((c) => c.dataset.value);
    const sort = document.getElementById("f-sort").value;

    let rows = OPPS.map((o) => {
      const u = urgency(o.deadline);
      const elig = eligibility(o, profile);
      return { o, u, elig };
    });

    rows = rows.filter(({ o, u, elig }) => {
      if (u === "closed" && !showClosed) return false;
      if (urgencyFilter !== "all") {
        const matchesUrgency = urgencyFilter === "later" ? u === "open" : u === urgencyFilter;
        if (!matchesUrgency) return false;
      }
      if (activeTypes.length && !activeTypes.includes(o.type)) return false;
      if (regionFilter === "nonconventional" && !COUNTRIES[o.dest].nonConventional) return false;
      if (regionFilter === "conventional" && COUNTRIES[o.dest].nonConventional) return false;
      if (compFilter !== "all" && o.compType !== compFilter) return false;
      if (eligibleOnly && !elig.eligible) return false;
      if (search) {
        const hay = `${o.title} ${o.org} ${COUNTRIES[o.dest].name}`.toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      if (sort === "stipend") return (b.o.stipendMax || 0) - (a.o.stipendMax || 0);
      if (sort === "newest") return OPPS.indexOf(b.o) - OPPS.indexOf(a.o);
      return new Date(a.o.deadline) - new Date(b.o.deadline);
    });

    document.getElementById("visible-count").textContent = rows.length;
    document.getElementById("stat-total").textContent = OPPS.length;
    document.getElementById("stat-eligible").textContent = OPPS.filter((o) => eligibility(o, profile).eligible).length;
    document.getElementById("stat-soon").textContent = OPPS.filter((o) => urgency(o.deadline) === "soon").length;

    if (!rows.length) {
      list.innerHTML = `<div class="empty-state">No opportunities match these filters yet. Try widening age, career stage, or destination.</div>`;
      return;
    }

    list.innerHTML = rows.map(({ o, u, elig }) => {
      const isOpen = openIds.has(o.id);
      const country = COUNTRIES[o.dest];
      const tags = o.softTags.map((t) => `<span class="badge priority">${t}</span>`).join("");
      const eligBadge = elig.eligible
        ? `<span class="badge eligible">Eligible</span>`
        : `<span class="badge not-eligible">Not eligible: ${elig.reasons.join(", ")}</span>`;
      const verifBadge = o.verification === "user_submitted_unverified"
        ? `<span class="badge unverified">Unverified — user submitted</span>`
        : o.verification === "aggregator_verified"
        ? `<span class="badge">Aggregator verified</span>`
        : `<span class="badge">Official source</span>`;

      const detail = isOpen ? `
        <div class="detail">
          <div>
            <p>${o.desc}</p>
            ${o.visaNote ? `<div class="note"><strong>Payment/visa note:</strong> ${o.visaNote}</div>` : ""}
            <a class="apply-btn" href="#" onclick="return false;">View source (demo)</a>
          </div>
          <dl>
            <dt>Destination</dt><dd>${country.name} (${o.dest})${country.nonConventional ? " · non-conventional" : ""}</dd>
            <dt>Duration</dt><dd>${o.duration.replaceAll("_", " ")}</dd>
            <dt>Minimum age</dt><dd>${o.minAge}${o.maxAge ? ` – ${o.maxAge}` : "+"}</dd>
            <dt>Education</dt><dd>${o.education.length ? o.education.map((e) => e.replaceAll("_", " ")).join(", ") : "Open to all levels"}</dd>
            <dt>Career stage</dt><dd>${o.career.length ? o.career.map((c) => c.replaceAll("_", " ")).join(", ") : "Open to all stages"}</dd>
            <dt>English required</dt><dd>${o.english.toUpperCase()}</dd>
            <dt>Nationality</dt><dd>${o.nationality.type ? `${o.nationality.type === "include" ? "Priority" : "Excludes"}: ${o.nationality.list.join(", ")}` : "Open to all nationalities"}</dd>
            <dt>Application effort</dt><dd>${o.effortLabel} (~${o.effortMin} min)</dd>
          </dl>
        </div>` : "";

      return `
        <article class="card ${urgencyClass(u)} ${eligibleOnly ? "" : elig.eligible ? "" : "ineligible"}" data-id="${o.id}">
          <div class="card-head" role="button" tabindex="0">
            <div>
              <div class="route-line">
                <span class="route-code">${o.dest}</span>
                <span>${country.name}</span>
                <span>·</span>
                <span>${TYPES.find((t) => t[0] === o.type)[1]}</span>
              </div>
              <h3>${o.title}</h3>
              <div class="org">${o.org}</div>
              <div class="badge-row">${eligBadge}${verifBadge}${tags}<span class="badge">~${o.effortMin} min application</span></div>
            </div>
            <div class="data-block">
              <span class="deadline-pill ${urgencyClass(u)}">${urgencyLabel(o.deadline, u)}</span>
              <div class="comp-line tabular">${compLine(o)}</div>
            </div>
          </div>
          ${detail}
        </article>`;
    }).join("");

    list.querySelectorAll(".card-head").forEach((head) => {
      head.addEventListener("click", () => {
        const id = head.parentElement.dataset.id;
        if (openIds.has(id)) openIds.delete(id); else openIds.add(id);
        render();
      });
      head.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); head.click(); }
      });
    });
  }

  ["f-nationality", "f-residence", "f-age", "f-education", "f-career", "f-employment", "f-english",
   "f-disability", "f-eligible-only", "f-search", "f-compensation", "f-urgency", "f-show-closed", "f-sort"
  ].forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("input", render);
    el.addEventListener("change", render);
  });

  render();
})();
</script>
